<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Books Catalogue</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body data-theme="light">
    <!-- Header -->
    <header class="header">
      <div class="header__content">
        <h1 class="header__title">Books Catalogue</h1>
        <nav class="header__nav"></nav>
      </div>
    </header>

    <!-- Main Layout -->
    <div class="layout">
      <!-- Main Content -->
      <main>
        <!-- Hero Section -->
        <section class="hero">
          <h2 class="hero__title">Find Your Next Read</h2>
          <p class="hero__subtitle">
            Search millions of books from the Open Library
          </p>

          <!-- Search Bar -->
          <div class="search-bar">
            <div class="search-bar__input-wrap">
              <input
                type="text"
                id="searchInput"
                class="search-bar__input"
                placeholder="Search by title or author…"
                autocomplete="off"
              />
            </div>
            <button id="searchBtn" class="btn btn--primary">Search</button>
            <button id="clearBtn" class="btn btn--ghost d-none">Clear</button>
          </div>

          <!-- Author Filters -->
          <div id="filtersBar" class="filters">
            <span class="filters__label">Filter by author:</span>
            <div id="authorFilters" class="filters__chips"></div>
            <button id="clearFilterBtn" class="btn btn--sm btn--ghost d-none">
              Clear
            </button>
          </div>
        </section>

        <!-- Results Section -->
        <section class="results-section">
          <div id="statusMsg" class="status-msg d-flex">
            <svg viewBox="0 0 64 64" fill="none" aria-hidden="true">
              <rect
                x="8"
                y="12"
                width="12"
                height="40"
                rx="2"
                fill="var(--accent)"
              />
              <rect
                x="26"
                y="12"
                width="12"
                height="40"
                rx="2"
                fill="var(--accent-muted)"
              />
              <rect
                x="44"
                y="12"
                width="12"
                height="40"
                rx="2"
                fill="var(--accent)"
              />
            </svg>
            <p>Enter a query to start searching</p>
          </div>
          <div id="resultsGrid" class="books-grid"></div>
        </section>
      </main>

      <!-- Sidebar (Favorites Panel) -->
      <aside class="favorites-panel">
        <div class="favorites-panel__heading">
          <span>❤ Favorites</span>
          <span class="badge" id="favCount">0</span>
        </div>
        <div id="favEmpty" class="fav-empty">
          <p>No favorites yet. Start by adding books!</p>
        </div>
        <ul id="favList" class="fav-list"></ul>
      </aside>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
